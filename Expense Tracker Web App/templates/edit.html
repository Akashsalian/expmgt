<!DOCTYPE html>
<html>
<head>
    <title>Edit Transaction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h2>Edit Transaction</h2>

<form method="POST">
    <select name="type">
        <option value="income" {% if data[1]=='income' %}selected{% endif %}>Income</option>
        <option value="expense" {% if data[1]=='expense' %}selected{% endif %}>Expense</option>
    </select><br><br>

    <input type="number" name="amount" value="{{data[2]}}"><br><br>
    <input type="text" name="category" value="{{data[3]}}"><br><br>

    <button type="submit">Update</button>
</form>

</div>

</body>
</html>
